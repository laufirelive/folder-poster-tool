name: Build Portable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: Folder-Poster-Windows
            torch-extra: --index-url https://download.pytorch.org/whl/cu121
          - os: macos-14
            artifact: Folder-Poster-macOS-ARM
            torch-extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyTorch
        run: |
          pip install torch torchvision ${{ matrix.torch-extra }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller folder-poster.spec

      - name: Add runtime README
        shell: bash
        run: |
          cat > dist/Folder-Poster/README.txt << 'ENDOFREADME'
          Folder Poster

          1) Install FFmpeg before using video extraction:
             - Windows: winget install ffmpeg
             - macOS:   brew install ffmpeg

          2) First launch requires downloading BiRefNet model files.

          3) If OS security blocks launch, allow app execution in system settings and retry.
          ENDOFREADME

      - name: Package as zip (split if >1.9GB on Windows)
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" == "Windows" ]; then
            7z a -tzip -v1900m "../${{ matrix.artifact }}.zip" Folder-Poster/
          else
            zip -r "../${{ matrix.artifact }}.zip" Folder-Poster/
          fi

      - name: Show packaged files
        shell: bash
        run: |
          ls -lh ${{ matrix.artifact }}.zip*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip*

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip*
